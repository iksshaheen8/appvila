<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>java</title>
</head>

<body>

<h1 id="heading">Lorem ipsum dolor sit amet consectetur adipisicing elit. Blanditiis, reprehenderit.</h1>
<input type="color" id="inputs">
<button id="btn">click here</button>


    <script>
        let heading=document.getElementById("heading");
        let inputs=document.getElementById("inputs");
        let btn=document.getElementById("btn");
        btn.addEventListener("click",function(){
            let a=inputs.value;
            heading.style.color=a;
        })
    </script>
</body>

</html>
